spring.application.name=marcenaria-reis-security

server.port=8080
server.error.include-message=never
server.error.include-stacktrace=never
server.compression.enabled=true

# Serve o site estático da pasta pai (HTML/CSS/JS permanecem no lugar)
app.static.root=..

# Limite de requisições por IP (proteção contra força bruta / DDoS leve)
app.security.rate-limit.max-requests=120
app.security.rate-limit.window-ms=60000

# Chave para futuras rotas administrativas (defina em produção via variável de ambiente)
app.security.api-key=${ADMIN_API_KEY:}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
